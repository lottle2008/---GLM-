name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build macOS app
        run: |
          pyinstaller zhipu_audio.spec --clean
      
      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../ZhipuAudio-macOS.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ZhipuAudio-macOS.zip

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows exe
        run: |
          pyinstaller zhipu_audio.spec --clean
      
      - name: Create ZIP archive
        run: |
          cd dist
          Compress-Archive -Path * -DestinationPath ..\ZhipuAudio-Windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ZhipuAudio-Windows.zip

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux binary
        run: |
          pyinstaller zhipu_audio.spec --clean
      
      - name: Create TAR archive
        run: |
          cd dist
          tar -czf ../ZhipuAudio-Linux.tar.gz *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ZhipuAudio-Linux.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: ./artifacts
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: ./artifacts
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: ./artifacts
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎉 AI语音克隆与生成工具 ${{ steps.get_version.outputs.VERSION }}
            
            ### 📦 下载说明
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | ZhipuAudio-macOS.zip | 解压后双击运行 |
            | Windows | ZhipuAudio-Windows.zip | 解压后双击运行 |
            | Linux | ZhipuAudio-Linux.tar.gz | 解压后运行 |
            
            ### 🚀 使用方法
            
            1. 下载对应平台的压缩包
            2. 解压到任意目录
            3. 双击运行程序
            4. 浏览器访问 http://localhost:7860
            
            ### 📝 更新内容
            
            请查看 [CHANGELOG.md](CHANGELOG.md) 了解详细更新内容。
            
            ### ⚠️ 注意事项
            
            - macOS: 首次运行可能需要在"系统偏好设置 > 安全性与隐私"中允许运行
            - Windows: 可能被杀毒软件误报，请添加信任
            - Linux: 需要赋予执行权限 `chmod +x ZhipuAudio`
          files: |
            artifacts/ZhipuAudio-macOS.zip
            artifacts/ZhipuAudio-Windows.zip
            artifacts/ZhipuAudio-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
